# Input #

input {
    ## Keyboard

    ### Keyboard Layout
    kb_layout = us,br

    ### Keyboard Variants
    kb_variant = ,abnt2

    ### Switch layout bind
    kb_options = grp:alt_shift_toggle

    ## Mouse

    ### Acceleration Profile
    accel_profile = flat

    ### Follow Mouse (specify if and how cursor movement should affect window focus)
    follow_mouse = 1

    ### Sensitivity
    sensitivity = 0
}
